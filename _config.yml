# -----------------------------------------------------------------------------
# 站点设置 (Site settings)
# -----------------------------------------------------------------------------

title: 罗玉清 # 网站标题
first_name: 玉清
middle_name: 
last_name: 罗
contact_note: "欢迎通过邮件与我联系进行学术交流。" # 这里的中文会显示在联系方式附近
description: "安徽大学通信工程专业本科生，专注于光通信与深度学习研究。"
footer_text: >
  版权所有 &copy; 2026 罗玉清. 基于 <a href="https://github.com/alshedivat/al-folio">al-folio</a> 主题构建.
keywords: 罗玉清, 安徽大学, 通信工程, OAM-FSO, 深度学习
lang: zh-cn # 语言设置为中文
icon: 🎓 # 网站标签栏图标

url: https://luoyuqing123.github.io
baseurl: 
last_updated: true # 开启显示最后更新时间
back_to_top: true 

# -----------------------------------------------------------------------------
# 社交链接 (Social Icons) - 已为你精简，只显示邮箱和GitHub
# -----------------------------------------------------------------------------
email: P22314125@stu.ahu.edu.cn
github_username: luoyuqing123
# 如果有其他社交账号，可以在下方按格式添加，没有则保持为空

# -----------------------------------------------------------------------------
# 布局设置 (Layout)
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false # 建议设为 false，让页面底部更自然
search_enabled: true
max_width: 930px

# -----------------------------------------------------------------------------
# 博客设置 (Blog)
# -----------------------------------------------------------------------------

blog_name: 个人博客
blog_description: 分享科研笔记与生活点滴
permalink: /blog/:year/:title/

# -----------------------------------------------------------------------------
# 学术文献设置 (Jekyll Scholar)
# -----------------------------------------------------------------------------

scholar:
  last_name: [罗, Luo] # 填入你的姓，这样在文献列表中你的名字会自动加粗
  first_name: [玉清, Yuqing]

  style: apa
  locale: zh # 文献语言设为中文
  source: /_bibliography/
  bibliography: papers.bib
  group_by: year
  group_order: descending

# -----------------------------------------------------------------------------
# 排除不需要的文件
# -----------------------------------------------------------------------------

exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - _pages/about_einstein.md # 彻底排除默认的爱因斯坦页面

# -----------------------------------------------------------------------------
# 插件与可选功能 (Optional Features)
# -----------------------------------------------------------------------------

plugins:
  - jekyll-feed
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-toc
  - jemoji

enable_darkmode: true # 开启深色模式切换
enable_navbar_social: false # 不在导航栏显示社交图标，让菜单更干净
enable_progressbar: true # 开启顶部的阅读进度条
enable_medium_zoom: true # 开启点击图片放大功能

# -----------------------------------------------------------------------------
# 响应式图片处理 (Imagemagick)
# -----------------------------------------------------------------------------

imagemagick:
  enabled: true
  widths: [480, 800, 1400]
  input_directories: ["assets/img/"]
  input_formats: [".jpg", ".jpeg", ".png", ".gif"]
  output_formats:
    webp: "-auto-orient -quality 85"

# -----------------------------------------------------------------------------
# 简历数据 (JSON Resume)
# -----------------------------------------------------------------------------

jekyll_get_json:
  - data: resume
    json: assets/json/resume.json

jsonresume:
  - basics
  - education
  - work
  - publications
  - projects
  - awards
  - skills
